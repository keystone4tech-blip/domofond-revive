server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Поддержка React Router (любой URL направляется на index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование запросов к PostgREST API (запросы перенаправляются на контейнер postgrest)
    location /api/ {
        proxy_pass http://postgrest:3000/; # Внутренний контейнер postgrest в Docker
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование запросов к Auth API бэкенда (запросы перенаправляются на контейнер backend)
    location /backend-api/ {
        proxy_pass http://backend:5000/; # Внутренний контейнер backend в Docker
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Запрет кэширования Service Worker и HTML-страниц (всегда запрашиваем свежие версии)
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|eot|ttf|otf)$ {
        # Исключаем sw.js, чтобы он не попал под долгосрочное кэширование
        if ($request_uri ~* "sw\.js") {
            return 405; # В nginx внутри locations регулярки обрабатываются раньше, но для надежности
        }
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Обслуживание документов и договоров
    location ~* \.(pdf|doc|docx|xls|xlsx)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }
}
